# ============================================================
# /etc/sync-ports.conf — Credentials for sync-ports.sh
# ============================================================
# WARNING: This file contains secrets.
# Set permissions: chmod 600 /etc/sync-ports.conf
# ============================================================
#
# === REQUIRED ===
SYNC_FILE=/tmp/ports.txt
SYNC_REMOTE_NAME=node1-ports.txt
SYNC_INTERVAL=600
#
# === TRANSFER METHOD: Pick ONE of the 3 options below ===
#
# ════════════════════════════════════════════════════════════
# Option A: WEBHOOK (recommended — no SSH at all, just HTTP)
# ════════════════════════════════════════════════════════════
#   On the main VPS, run: python3 webhook-receiver.py --token mysecrettoken --port 9090
#   Then uncomment and set:
SYNC_WEBHOOK_URL=https://YOUR_MAIN_VPS_IP:9090/upload
SYNC_WEBHOOK_TOKEN=mysecrettoken
#
# ════════════════════════════════════════════════════════════
# Option B: SSH KEY (scp with key — no password in any file)
# ════════════════════════════════════════════════════════════
#   1. Generate key: ssh-keygen -t ed25519 -f ~/.ssh/sync-key -N ""
#   2. Copy to VPS:  ssh-copy-id -i ~/.ssh/sync-key.pub root@YOUR_VPS_IP
#   3. Uncomment below (and comment out Option A):
# SYNC_HOST=YOUR_MAIN_VPS_IP
# SYNC_USER=root
# SYNC_SSH_KEY=/root/.ssh/sync-key
#
# ════════════════════════════════════════════════════════════
# Option C: PASSWORD (scp with sshpass — least secure)
# ════════════════════════════════════════════════════════════
#   Uncomment below (and comment out Option A):
# SYNC_HOST=YOUR_MAIN_VPS_IP
# SYNC_USER=root
# SYNC_PASSWORD=YOUR_PASSWORD
